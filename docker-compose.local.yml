# docker-compose.local.yml
# ─────────────────────────────────────────────────────────
# LOCAL GELİŞTİRME OVERRIDE
#
# Kullanım:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#   make local-up  (Makefile kısayolu)
#
# Bu dosyada:
#   - Nginx port 80'de dışarıya açık (HTTP, SSL yok)
#   - Debug için servis portları 127.0.0.1'e bağlı
#   - Android (sanal cihaz): http://10.0.2.2:80
#   - Android (fiziksel telefon, aynı WiFi): http://BİLGİSAYAR_IP:80
# ─────────────────────────────────────────────────────────

services:

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
      frontend-app:
        condition: service_healthy
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - platform

  # ── Debug portları — sadece localhost'a bağlı ──────────

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
    # DBeaver veya psql ile local bağlantı için

  redis:
    ports:
      - "127.0.0.1:6379:6379"
    # redis-cli ile local debug için

  backend:
    ports:
      - "127.0.0.1:8080:8080"
    # IntelliJ IDEA remote debug veya direkt curl için
    # Android BURAYI KULLANMAZ — Nginx:80 üzerinden erişir

  vision-service:
    ports:
      - "127.0.0.1:8091:8091"
    # Vision endpoint'lerini direkt test etmek için

  ai-service:
    ports:
      - "127.0.0.1:8092:8092"
    # AI endpoint'lerini direkt test etmek için

  # ── Ngrok (opsiyonel — make ngrok-start ile başlar) ────

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http nginx:80
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    networks:
      - platform
    profiles:
      - ngrok
    # Kullanım:
    #   make ngrok-start
    #   http://localhost:4040 → public URL'yi gör
    #   android-app/build.gradle'da şunu değiştir:
    #   buildConfigField "String", "API_BASE_URL", "\"https://xxxxx.ngrok.io\""
