name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: build ve test
        run: mvn -B -ntp -f backend/pom.xml verify
      - name: jacoco raporu kontrol
        run: test -f backend/target/site/jacoco/jacoco.xml
      - name: artefaktlari yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            backend/target/surefire-reports
            backend/target/site/jacoco

  python:
    name: Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ai-service, vision-service]
    defaults:
      run:
        working-directory: python-services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.service }}-${{ hashFiles(format('python-services/{0}/requirements*.txt', matrix.service)) }}
      - name: bagimliliklar
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: testler
        run: python -m pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml tests
      - name: coverage yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.service }}
          path: python-services/${{ matrix.service }}/coverage.xml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: bagimliliklar
        run: npm ci
      - name: tip kontrolu
        run: npm run typecheck
      - name: build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, python, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: env hazirla
        run: cp .env.example .env
      - name: compose config dogrula
        run: docker compose -f infra/docker/compose/docker-compose.yml config > /dev/null
      - name: build kontrol
        run: docker compose -f infra/docker/compose/docker-compose.yml build backend ai-service vision-service frontend-app
