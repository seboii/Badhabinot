name: CI

# master push'ta tam pipeline deploy.yml'de çalışır (test → build → deploy);
# çift test koşmamak için CI yalnızca PR'larda ve develop push'ta doğrular.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [master, develop]

jobs:

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build ve test
        run: mvn -B -ntp -f backend/pom.xml verify
      - name: JaCoCo raporu kontrol
        run: test -f backend/target/site/jacoco/jacoco.xml
      - name: Artefaktlari yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            backend/target/surefire-reports
            backend/target/site/jacoco

  python:
    name: Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [ai-service, vision-service]
    defaults:
      run:
        working-directory: python-services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.service }}-${{ hashFiles(format('python-services/{0}/requirements*.txt', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.service }}-

      - name: Bagimliliklar
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Testler
        run: >
          python -m pytest
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --tb=short
          -q
          tests

      - name: Coverage yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.service }}
          path: python-services/${{ matrix.service }}/coverage.xml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Bagimliliklar
        run: npm ci
      - name: Tip kontrolu
        run: npm run typecheck
      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, python, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Env hazirla
        run: cp .env.example .env
      - name: Compose config dogrula
        run: docker compose -f docker-compose.yml config > /dev/null
      - name: Build kontrol
        run: >
          docker compose -f docker-compose.yml build
          backend ai-service vision-service frontend-app
