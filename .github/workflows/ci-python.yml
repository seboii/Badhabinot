name: Python CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - ai-service
          - vision-service

    defaults:
      run:
        working-directory: python-services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.service }}-${{ hashFiles(format('python-services/{0}/requirements*.txt', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.service }}-

      - name: Install runtime and dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        continue-on-error: false

      - name: Run pytest with coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml tests
        continue-on-error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.service }}
          path: python-services/${{ matrix.service }}/coverage.xml
