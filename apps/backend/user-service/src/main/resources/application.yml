server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: user-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/badhabinot_user}
    username: ${SPRING_DATASOURCE_USERNAME:badhabinot}
    password: ${SPRING_DATASOURCE_PASSWORD:badhabinot}
  data:
    redis:
      repositories:
        enabled: false
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2s
  cache:
    type: redis
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState,ping
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}
  internal:
    api-key: ${INTERNAL_API_KEY:change-me-in-real-environments}

user:
  cache:
    ttl: ${USER_CONTEXT_CACHE_TTL:PT5M}
