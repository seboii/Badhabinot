server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: monitoring-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/badhabinot_monitoring}
    username: ${SPRING_DATASOURCE_USERNAME:badhabinot}
    password: ${SPRING_DATASOURCE_PASSWORD:badhabinot}
  data:
    redis:
      repositories:
        enabled: false
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2s
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db,pythonServices
        liveness:
          include: livenessState,ping
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}

integration:
  internal-api-key: ${INTERNAL_API_KEY:change-me-in-real-environments}
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:8082}
    connect-timeout: PT2S
    read-timeout: PT5S
  vision-service:
    base-url: ${VISION_SERVICE_URL:http://localhost:8091}
    connect-timeout: PT2S
    read-timeout: ${VISION_SERVICE_READ_TIMEOUT:PT10S}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8092}
    connect-timeout: PT2S
    read-timeout: ${AI_SERVICE_READ_TIMEOUT:PT25S}

monitoring:
  redis:
    analysis-job-key-prefix: ${ANALYSIS_JOB_KEY_PREFIX:badhabinot:monitoring:analysis-job:}
    analysis-job-ttl: ${ANALYSIS_JOB_CACHE_TTL:PT15M}
