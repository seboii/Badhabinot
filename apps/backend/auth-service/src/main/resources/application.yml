server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: auth-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/badhabinot_auth}
    username: ${SPRING_DATASOURCE_USERNAME:badhabinot}
    password: ${SPRING_DATASOURCE_PASSWORD:badhabinot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState,ping
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    issuer: badhabinot-auth-service
    secret: ${SECURITY_JWT_SECRET}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D

integration:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082}
    internal-api-key: ${INTERNAL_API_KEY:change-me-in-real-environments}
    connect-timeout: PT2S
    read-timeout: PT5S
