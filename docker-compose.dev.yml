# Overlay this file in development to publish service ports to the host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or:    make dev
services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  vision-service:
    ports:
      - "${VISION_SERVICE_PORT:-8091}:8091"

  ai-service:
    ports:
      - "${AI_SERVICE_PORT:-8092}:8092"

  frontend-app:
    ports:
      - "${FRONTEND_PORT:-3000}:80"
