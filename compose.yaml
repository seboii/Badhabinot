name: badhabinot-platform

services:
  postgres:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  ai-service:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: ai-service
    ports:
      - "${AI_SERVICE_PORT:-8092}:8092"

  vision-service:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: vision-service
    ports:
      - "${VISION_SERVICE_PORT:-8091}:8091"

  frontend-app:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: frontend-app
    ports:
      - "${FRONTEND_PORT:-3000}:80"

networks:
  platform:
    name: badhabinot-platform

volumes:
  postgres-data:
