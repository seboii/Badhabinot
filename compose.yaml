name: badhabinot-platform

services:
  postgres:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  user-service:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: user-service
    ports:
      - "${USER_SERVICE_PORT:-8082}:8082"

  auth-service:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"

  ai-service:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: ai-service
    ports:
      - "${AI_SERVICE_PORT:-8092}:8092"

  vision-service:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: vision-service
    ports:
      - "${VISION_SERVICE_PORT:-8091}:8091"

  monitoring-service:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: monitoring-service
    ports:
      - "${MONITORING_SERVICE_PORT:-8083}:8083"

  api-gateway:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: api-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  frontend-app:
    extends:
      file: ./infra/docker/compose/docker-compose.yml
      service: frontend-app
    ports:
      - "${FRONTEND_PORT:-3000}:80"

networks:
  platform:
    name: badhabinot-platform

volumes:
  postgres-data:
