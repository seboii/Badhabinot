# Grafana, /var/lib/grafana/dashboards altındaki JSON panoları otomatik yükler.
apiVersion: 1
providers:
  - name: Badhabinot
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
