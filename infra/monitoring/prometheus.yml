# Prometheus scrape yapılandırması — iç ağdan (badhabinot-platform) toplar.
# Backend metrikleri Spring Boot Actuator + Micrometer ile /actuator/prometheus'ta.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: badhabinot-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]
        labels:
          application: badhabinot-backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
