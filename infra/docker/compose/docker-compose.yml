name: badhabinot-platform

x-runtime-defaults: &runtime-defaults
  restart: unless-stopped
  init: true
  env_file:
    - ../../../.env

services:
  postgres:
    <<: *runtime-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-badhabinot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      POSTGRES_DB: postgres
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../db/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - platform
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-badhabinot} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    <<: *runtime-defaults
    image: redis:7.2-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    expose:
      - "6379"
    volumes:
      - ../../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - platform
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  user-service:
    <<: *runtime-defaults
    build:
      context: ../../..
      dockerfile: infra/docker/dockerfiles/spring-service.Dockerfile
      args:
        SERVICE_MODULE: apps/backend/user-service
        SERVICE_ARTIFACT: user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badhabinot_user
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-badhabinot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-YmFkaGFiaW5vdC1kZXZlbG9wbWVudC1zZWNyZXQta2V5LTIwMjYtYmFkaGFiaW5vdA==}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      USER_CONTEXT_CACHE_TTL: ${USER_CONTEXT_CACHE_TTL:-PT5M}
      JAVA_OPTS: ${USER_SERVICE_JAVA_OPTS:-}
    expose:
      - "8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8082/actuator/health/readiness > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s

  auth-service:
    <<: *runtime-defaults
    build:
      context: ../../..
      dockerfile: infra/docker/dockerfiles/spring-service.Dockerfile
      args:
        SERVICE_MODULE: apps/backend/auth-service
        SERVICE_ARTIFACT: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badhabinot_auth
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-badhabinot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-YmFkaGFiaW5vdC1kZXZlbG9wbWVudC1zZWNyZXQta2V5LTIwMjYtYmFkaGFiaW5vdA==}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8082}
      JAVA_OPTS: ${AUTH_SERVICE_JAVA_OPTS:-}
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - platform
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8081/actuator/health/readiness > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s

  ai-service:
    <<: *runtime-defaults
    build:
      context: ../../..
      dockerfile: infra/docker/dockerfiles/python-service.Dockerfile
      args:
        SERVICE_PATH: apps/python-services/ai-service
        APP_PORT: 8092
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-mock-behavior-analyzer}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_READINESS_TIMEOUT_SECONDS: ${AI_READINESS_TIMEOUT_SECONDS:-10}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_PORT: 8092
    expose:
      - "8092"
    networks:
      - platform
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  vision-service:
    <<: *runtime-defaults
    build:
      context: ../../..
      dockerfile: infra/docker/dockerfiles/python-service.Dockerfile
      args:
        SERVICE_PATH: apps/python-services/vision-service
        APP_PORT: 8091
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_PORT: 8091
    expose:
      - "8091"
    networks:
      - platform
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  monitoring-service:
    <<: *runtime-defaults
    build:
      context: ../../..
      dockerfile: infra/docker/dockerfiles/spring-service.Dockerfile
      args:
        SERVICE_MODULE: apps/backend/monitoring-service
        SERVICE_ARTIFACT: monitoring-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badhabinot_monitoring
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-badhabinot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-YmFkaGFiaW5vdC1kZXZlbG9wbWVudC1zZWNyZXQta2V5LTIwMjYtYmFkaGFiaW5vdA==}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8082}
      VISION_SERVICE_URL: ${VISION_SERVICE_URL:-http://vision-service:8091}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8092}
      VISION_SERVICE_READ_TIMEOUT: ${VISION_SERVICE_READ_TIMEOUT:-PT10S}
      AI_SERVICE_READ_TIMEOUT: ${AI_SERVICE_READ_TIMEOUT:-PT25S}
      ANALYSIS_JOB_CACHE_TTL: ${ANALYSIS_JOB_CACHE_TTL:-PT15M}
      ANALYSIS_JOB_KEY_PREFIX: ${ANALYSIS_JOB_KEY_PREFIX:-badhabinot:monitoring:analysis-job:}
      JAVA_OPTS: ${MONITORING_SERVICE_JAVA_OPTS:-}
    expose:
      - "8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      vision-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - platform
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8083/actuator/health/readiness > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

  api-gateway:
    <<: *runtime-defaults
    build:
      context: ../../..
      dockerfile: infra/docker/dockerfiles/spring-service.Dockerfile
      args:
        SERVICE_MODULE: apps/backend/api-gateway
        SERVICE_ARTIFACT: api-gateway
    environment:
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-YmFkaGFiaW5vdC1kZXZlbG9wbWVudC1zZWNyZXQta2V5LTIwMjYtYmFkaGFiaW5vdA==}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8082}
      MONITORING_SERVICE_URL: ${MONITORING_SERVICE_URL:-http://monitoring-service:8083}
      JAVA_OPTS: ${GATEWAY_JAVA_OPTS:-}
    expose:
      - "8080"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      monitoring-service:
        condition: service_healthy
    networks:
      - platform
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health/readiness > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend-app:
    <<: *runtime-defaults
    build:
      context: ../../..
      dockerfile: infra/docker/dockerfiles/frontend-app.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    expose:
      - "80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - platform
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  platform:
    name: badhabinot-platform

volumes:
  postgres-data:
