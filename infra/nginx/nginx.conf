# infra/nginx/nginx.conf
# ─────────────────────────────────────────────────────────
# Nginx ana konfigürasyonu — tüm ortamlar için ortak
# Site-specific ayarlar: local.conf veya prod.conf
# ─────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Yüz girişi canlılık akışı tek kare yerine kısa bir kare DİZİSİ (base64) gönderir;
    # varsayılan 1MB sınırı 413 verir. Çok-kareli istekler için tavanı yükselt.
    client_max_body_size 20m;

    # Güvenlik header'ları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SSE (Server-Sent Events) için buffer kapatma
    # Chat streaming bu sayede çalışır
    proxy_buffering off;
    proxy_cache off;

    include /etc/nginx/conf.d/*.conf;
}
