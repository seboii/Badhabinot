# infra/nginx/local.conf
# ─────────────────────────────────────────────────────────
# LOCAL GELİŞTİRME — HTTP :80 + HTTPS :443
#
# Erişim:
#   Web (kamera - HTTPS):       https://192.168.1.26  (sertifika uyarısı → Gelişmiş → Devam et)
#   Web (lokal):                http://localhost
#   Android (sanal cihaz):      http://10.0.2.2
#   Android (fiziksel telefon): http://192.168.1.26
#
# SSL sertifikası yoksa:  make gen-cert
# ─────────────────────────────────────────────────────────

upstream backend {
    server backend:8080;
    keepalive 32;
}

upstream frontend {
    server frontend-app:80;
    keepalive 16;
}

# ── HTTP :80 — Android emülatör + fiziksel telefon + local API ──
server {
    listen 80;
    server_name _;

    location = /api/v1/monitoring/chat/stream {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 30s;
    }

    location /actuator/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error": "Servis başlatılıyor, lütfen bekleyin..."}';
        add_header Content-Type application/json;
    }
}

# ── HTTPS :443 — Web kamera izni için (tarayıcı güvenliği) ──────
# SSL sertifikası gerektirir: make gen-cert
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/local.crt;
    ssl_certificate_key /etc/nginx/ssl/local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location = /api/v1/monitoring/chat/stream {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 30s;
    }

    location /actuator/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error": "Servis başlatılıyor, lütfen bekleyin..."}';
        add_header Content-Type application/json;
    }
}
