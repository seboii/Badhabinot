name: badhabinot-platform

x-runtime-defaults: &runtime-defaults
  restart: unless-stopped
  init: true
  # Log rotasyonu — konteyner json log'lari sinirsiz buyuyup disk doldurmasin.
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  env_file:
    - .env

services:
  postgres:
    <<: *runtime-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-badhabinot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - platform
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-badhabinot} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    <<: *runtime-defaults
    image: redis:7.2-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - platform
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Local LLM via Ollama ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - platform
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  # Pulls the base LLM model once Ollama is healthy, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull"]
    command: ["${OLLAMA_BASE_MODEL_NAME:-llama3.2:3b}"]
    networks:
      - platform

  # Builds the custom badhabinot model from Modelfile after base model is pulled.
  ollama-build:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL_NAME: ${OLLAMA_BASE_MODEL_NAME:-llama3.2:3b}
      BADHABINOT_MODEL_NAME: ${OLLAMA_MODEL_NAME:-badhabinot:latest}
      COACH_MODEL_NAME: ${AI_OLLAMA_MODEL_NAME:-badhabinot-coach:latest}
    volumes:
      - ./infra/ollama:/modelfiles:ro
      # Fine-tune edilmis GGUF artefaktlari (gitignore'lu; yerelde uretilir). Dosya yoksa adim atlanir.
      - ./python-services/ai-service/finetune/outputs:/models:ro
    entrypoint: ["sh", "/modelfiles/build-model.sh"]
    networks:
      - platform

  backend:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: infra/docker/dockerfiles/spring-service.Dockerfile
    environment:
      AUTH_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badhabinot_auth
      AUTH_DATASOURCE_USERNAME: ${POSTGRES_USER:-badhabinot}
      AUTH_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      USER_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badhabinot_user
      USER_DATASOURCE_USERNAME: ${POSTGRES_USER:-badhabinot}
      USER_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      MONITORING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badhabinot_monitoring
      MONITORING_DATASOURCE_USERNAME: ${POSTGRES_USER:-badhabinot}
      MONITORING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-badhabinot}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-YmFkaGFiaW5vdC1kZXZlbG9wbWVudC1zZWNyZXQta2V5LTIwMjYtYmFkaGFiaW5vdA==}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      USER_CONTEXT_CACHE_TTL: ${USER_CONTEXT_CACHE_TTL:-PT5M}
      ANALYSIS_JOB_CACHE_TTL: ${ANALYSIS_JOB_CACHE_TTL:-PT15M}
      ANALYSIS_JOB_KEY_PREFIX: ${ANALYSIS_JOB_KEY_PREFIX:-badhabinot:monitoring:analysis-job:}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://backend:8080}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://backend:8080}
      MONITORING_SERVICE_URL: ${MONITORING_SERVICE_URL:-http://backend:8080}
      VISION_SERVICE_URL: ${VISION_SERVICE_URL:-http://vision-service:8091}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8092}
      VISION_SERVICE_READ_TIMEOUT: ${VISION_SERVICE_READ_TIMEOUT:-PT10S}
      AI_SERVICE_READ_TIMEOUT: ${AI_SERVICE_READ_TIMEOUT:-PT60S}
      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: /app/config/firebase-service-account.json
      JAVA_OPTS: ${BACKEND_JAVA_OPTS:-}
    volumes:
      - ./infra/firebase:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vision-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - platform
    # PORTS: Dışarıya AÇMA — Nginx üzerinden erişilir
    # Local debug için docker-compose.local.yml'de açılır
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health/readiness > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  ai-service:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: infra/docker/dockerfiles/python-service.Dockerfile
      args:
        SERVICE_PATH: python-services/ai-service
        APP_PORT: 8092
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      # Use Ollama running in the Docker network as the default LLM provider
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Varsayilan = fine-tune edilmis kullanici modeli (Qwen2.5-1.5B QLoRA).
      # 7B base'e donmek icin: AI_OLLAMA_MODEL_NAME=badhabinot:latest
      OLLAMA_MODEL_NAME: ${AI_OLLAMA_MODEL_NAME:-badhabinot-coach:latest}
      # OpenAI-compatible fallback (used only if AI_PROVIDER=openai-compatible)
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-gpt-4.1-mini}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
      AI_READINESS_TIMEOUT_SECONDS: ${AI_READINESS_TIMEOUT_SECONDS:-10}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_PORT: 8092
    depends_on:
      ollama:
        condition: service_healthy
      ollama-build:
        condition: service_completed_successfully
    networks:
      - platform
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  vision-service:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: infra/docker/dockerfiles/python-service.Dockerfile
      args:
        SERVICE_PATH: python-services/vision-service
        APP_PORT: 8091
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-real-environments}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_PORT: 8091
      FACE_DATA_DIR: /app/data/users
      SESSION_LOG_DIR: /app/logs/sessions
    volumes:
      - vision-face-data:/app/data/users
      - vision-session-logs:/app/logs/sessions
    networks:
      - platform
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend-app:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: infra/docker/dockerfiles/frontend-app.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    volumes:
      - ./infra/nginx/frontend-app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - platform
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── İzleme: node-exporter (host disk/RAM/CPU metrikleri) — yalnız iç ağ ────
  node-exporter:
    <<: *runtime-defaults
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - platform

  # ── İzleme: Prometheus (metrik toplama) — yalnız iç ağ, dışarı kapalı ──────
  prometheus:
    <<: *runtime-defaults
    image: prom/prometheus:latest
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - platform

  # ── İzleme: Grafana (panolar) — dışarı port açmaz; prod'da Caddy /grafana ──
  grafana:
    <<: *runtime-defaults
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - platform

  # ── İzleme: postgres-exporter (DB metrikleri: bağlantı, tablo boyutu, işlem) ─
  # pg_stat_* görünümleri küme genelidir → tek bağlantı (postgres DB) üç DB'yi de kapsar.
  postgres-exporter:
    <<: *runtime-defaults
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-badhabinot}:${POSTGRES_PASSWORD:-badhabinot}@postgres:5432/postgres?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

networks:
  platform:
    name: badhabinot-platform
    # Docker'in varsayilan surucusu zaten 'bridge'; mevcut agi gereksiz yeniden
    # olusturmamak icin acik 'driver' belirtilmez (islevsel olarak aynidir).

volumes:
  postgres-data:
  vision-face-data:
  vision-session-logs:
  ollama-models:
  prometheus-data:
  grafana-data:
