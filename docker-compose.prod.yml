# docker-compose.prod.yml — ÜRETİM OVERLAY (Azure)
# ─────────────────────────────────────────────────────────
# Caddy ile otomatik HTTPS (Let's Encrypt). Debug portları AÇILMAZ
# (sadece Caddy 80/443 dışarı açılır; postgres/redis/backend/vision/ai/ollama iç ağda kalır).
#
# Çalıştırma (sunucuda):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Gereksinimler:
#   1. Azure: Public IP'ye DNS adı etiketi → PUBLIC_DOMAIN (xxx.bolge.cloudapp.azure.com)
#   2. Azure NSG: gelen 80 ve 443 portları AÇIK
#   3. .env.prod doldurulmuş (bkz. .env.prod.example)
#   4. Fine-tune GGUF sunucuda: python-services/ai-service/finetune/outputs/badhabinot-coach.gguf
# ─────────────────────────────────────────────────────────

services:
  # ── 30GB sunucu: 7B base'i ATLA, yalnizca fine-tune coach modelini kur ──────
  # ollama-pull'u no-op yap (4.7GB qwen2.5:7b cekilmez).
  ollama-pull:
    entrypoint: ["sh", "-c", "echo 'coach-only: base model pull atlandi'"]
    command: []
  # ollama-build coach-only modunda calissin (badhabinot:latest 7B'den uretilmez).
  ollama-build:
    environment:
      COACH_ONLY: "true"

  # Grafana uretimde Caddy'nin /grafana alt-yolundan sunulur (alt-yol modu aktif).
  grafana:
    environment:
      GF_SERVER_ROOT_URL: https://${PUBLIC_DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    init: true
    depends_on:
      frontend-app:
        condition: service_healthy
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      TLS_EMAIL: ${TLS_EMAIL:-admin@badhabinot.com}
    ports:
      - "80:80"      # HTTP → HTTPS yönlendirme (Caddy otomatik) + ACME challenge
      - "443:443"    # HTTPS — TLS burada sonlanır
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # sertifikalar burada kalıcı (yeniden başlatmada tekrar alınmaz)
      - caddy-config:/config
    networks:
      - platform
    stop_grace_period: 15s

volumes:
  caddy-data:
  caddy-config:
