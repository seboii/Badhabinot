# SUNUCU OVERRIDE
#
# ŞU AN KULLANILMIYOR — yorumda hazır.
#
# Aktif etmek için:
#   1. Alan adını ayarla: api.badhabinot.com → sunucu IP'si
#   2. SSL sertifikası al: sudo certbot certonly --standalone -d api.badhabinot.com
#   3. .env.prod dosyasını doldur (.env.prod.example şablonundan)
#   4. Aşağıdaki YAML'ı uncomment et
#   5. Sunucuda çalıştır:
#      docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
#      veya:  make prod-up
#
# ─────────────────────────────────────────────────────────

